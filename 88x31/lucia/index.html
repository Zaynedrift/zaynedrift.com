<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- embed stuff, google font and title :3 -->
  <meta property="og:title" content="Luci's meowSite">
  <meta property="og:description" content="I break stuff on the internet :3">
  <meta property="og:image" content="https://cdn.discordapp.com/emojis/1026533070955872337.webp">
  <meta property="og:url" content="https://zaynedrift.com/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://cdn.discordapp.com/emojis/1494470585475010570.webp">
  <title>Luci's meowSite</title>
  <!-- teehee styling in html file >:3 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* persistant colours across the entire page */
    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2a;
      --border: rgba(255,255,255,0.07);
      --text: #f0eeff;
      --muted: #b899da;
      --accent: #b97cff;
      --glow: rgba(185,124,255,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.12;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .aurora-blob:nth-child(1) {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #b97cff, transparent 70%);
      top: -200px; left: -200px;
      animation-delay: 0s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }
    .page {
      position: relative;
      z-index: 1;
      max-width: 580px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .text {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      max-width: 340px;
      margin-top: 14px;
      line-height: 1.6;
      font-weight: 300;
      animation: fadeUp 0.6s 0.5s ease both;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 32px 0;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
  </div>
  <div class="page">
    <div>
        <img src="/88x31/lucia.png" width="88" height="31" style="animation: fadeUp 0.6s 0.3s ease both;">
    </div>
    <div class="divider"></div>
    <div>
        <p class="text">hey there! :3</p>
        <p class="text">you are currently looking at my 88x31 button made by <a href="https://" target="_blank">PixPocket</a> :3</p>
    </div>
    <div class="divider"></div>
    <div>
        <p class="text">if you want to add my 88x31 to your site, you can use the following code:</p>
        <pre class="text" style="background: var(--surface2); padding: 12px; border-radius: 6px; overflow-x: auto; size: 9px;"><code>&lt;a href=&quot;https://zaynedrift.com&quot; target=&quot;_blank&quot;&gt;&lt;img src=&quot;https://zaynedrift.com/88x31/lucia.png&quot; width=&quot;88&quot; height=&quot;31&quot;&gt;&lt;/a&gt;</code></pre>
    </div>
  </div>
</body>
</html>
