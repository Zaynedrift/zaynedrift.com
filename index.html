  <!-- teehee styling in html file >:3 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* persistant colours across the entire page */
    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2a;
      --border: rgba(255,255,255,0.07);
      --text: #f0eeff;
      --muted: #b899da;
      --accent: #b97cff;
      --glow: rgba(185,124,255,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.12;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .aurora-blob:nth-child(1) {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #b97cff, transparent 70%);
      top: -200px; left: -200px;
      animation-delay: 0s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }
    .page {
      position: relative;
      z-index: 1;
      max-width: 580px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .avatar-wrap {
      position: relative;
      margin-bottom: 22px;
      animation: fadeUp 0.6s ease both;
    }
    .avatar-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      padding: 2.5px;
      background: conic-gradient(from 0deg, var(--accent));
      animation: spin 6s linear infinite;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      user-select: none;
    }
    .name {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: clamp(24px, 6vw, 30px);
      letter-spacing: -0.5px;
      text-align: center;
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .handle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .bio {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      max-width: 340px;
      margin-top: 14px;
      line-height: 1.6;
      font-weight: 300;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
      animation: fadeUp 0.6s 0.25s ease both;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      letter-spacing: 0.4px;
    }
    .badge.pro {
      border-color: rgba(185,124,255,0.4);
      background: rgba(185,124,255,0.1);
      color: var(--accent);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 32px 0;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .section-label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      align-self: flex-start;
      margin-bottom: 14px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.18s;
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(185,124,255,0.06), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .link-card:hover {
      border-color: rgba(185,124,255,0.35);
      background: var(--surface2);
      transform: translateY(-2px);
    }
    .link-card:hover::before { opacity: 1; }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .link-text { flex: 1; }
    .link-title {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.2;
    }
    .link-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 16px;
      transition: transform 0.2s, color 0.2s;
    }
    .link-card:hover .link-arrow {
      transform: translate(3px, -3px);
      color: var(--accent);
    }

    .icon-purple { background: rgba(185,124,255,0.15); }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-card:nth-child(1) { animation: fadeUp 0.5s 0.35s ease both; }
    .link-card:nth-child(2) { animation: fadeUp 0.5s 0.42s ease both; }
    .link-card:nth-child(3) { animation: fadeUp 0.5s 0.49s ease both; }
    .link-card:nth-child(4) { animation: fadeUp 0.5s 0.56s ease both; }
    .link-card:nth-child(5) { animation: fadeUp 0.5s 0.63s ease both; }
    .shout-card { animation: fadeUp 0.5s 0.38s ease both; }
    .stats      { animation: fadeUp 0.5s 0.45s ease both; }
  </style>
